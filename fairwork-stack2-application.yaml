AWSTemplateFormatVersion: '2010-09-09'

Description: >
  FairWork Pulse Stack 2. Imports networking, database, encryption, artifact
  bucket, and LabRole outputs from Stack 1. Creates Cognito authentication,
  API Gateway, API/worker/analytics/database-init Lambda functions, SQS with a
  dead-letter queue, SNS alerts, an optional SES identity, EventBridge
  scheduling, log groups, and CloudWatch alarms.

Parameters:

  InfrastructureStackName:
    Type: String
    Default: fairwork-infrastructure
    Description: Name of the deployed Stack 1 CloudFormation stack.

  ProjectName:
    Type: String
    Default: fairwork-pulse
    AllowedPattern: '^[a-z][a-z0-9-]{2,30}$'

  EnvironmentName:
    Type: String
    Default: poc
    AllowedPattern: '^[a-z][a-z0-9-]{1,15}$'

  ApiStageName:
    Type: String
    Default: poc
    AllowedPattern: '^[a-zA-Z0-9_-]+$'

  AllowedOrigin:
    Type: String
    Default: http://localhost:3000
    Description: Frontend origin allowed by API CORS responses.

  LambdaRuntime:
    Type: String
    Default: nodejs22.x
    AllowedValues:
      - nodejs22.x
      - nodejs24.x
      - nodejs18.x
    Description: >
      nodejs22.x is recommended. nodejs18.x remains available only as a
      temporary AWS Academy compatibility option.

  ApiLambdaS3Key:
    Type: String

  WorkerLambdaS3Key:
    Type: String

  AnalyticsLambdaS3Key:
    Type: String

  DatabaseInitLambdaS3Key:
    Type: String

  DeploymentVersion:
    Type: String
    Default: initial
    Description: Git commit SHA or another value used to refresh API deployment.

  AnalyticsScheduleExpression:
    Type: String
    Default: rate(1 day)

  AdminNotificationEmail:
    Type: String
    Default: ''
    Description: Optional email endpoint for SNS operational alerts.

  SesFromEmail:
    Type: String
    Default: ''
    Description: Optional SES sender address. Verification is required.

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 7
      - 14
      - 30
      - 60
      - 90

Conditions:

  HasAdminNotificationEmail: !Not
    - !Equals
      - !Ref AdminNotificationEmail
      - ''

  HasSesFromEmail: !Not
    - !Equals
      - !Ref SesFromEmail
      - ''

Resources:

  # ==========================================================================
  # COGNITO AUTHENTICATION
  # ==========================================================================

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-${EnvironmentName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolTags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-${EnvironmentName}-web-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  EmployeeGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: EMPLOYEE
      Description: FairWork Pulse employee users
      Precedence: 40
      UserPoolId: !Ref UserPool

  EmployerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: EMPLOYER
      Description: FairWork Pulse employer users
      Precedence: 30
      UserPoolId: !Ref UserPool

  ModeratorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: MODERATOR
      Description: FairWork Pulse content moderators
      Precedence: 20
      UserPoolId: !Ref UserPool

  AdministratorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMINISTRATOR
      Description: FairWork Pulse administrators
      Precedence: 10
      UserPoolId: !Ref UserPool

  # ==========================================================================
  # SQS AND SNS
  # ==========================================================================

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${EnvironmentName}-jobs-dlq'
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  JobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${EnvironmentName}-jobs'
      VisibilityTimeout: 360
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-${EnvironmentName}-alerts'
      DisplayName: FairWork Pulse alerts
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AlertEmailSubscription:
    Condition: HasAdminNotificationEmail
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AdminNotificationEmail

  SesEmailIdentity:
    Condition: HasSesFromEmail
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref SesFromEmail

  # ==========================================================================
  # CLOUDWATCH LOG GROUPS
  # ==========================================================================

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-api'
      RetentionInDays: !Ref LogRetentionDays

  WorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-worker'
      RetentionInDays: !Ref LogRetentionDays

  AnalyticsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-analytics'
      RetentionInDays: !Ref LogRetentionDays

  DatabaseInitFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-database-init'
      RetentionInDays: !Ref LogRetentionDays

  # ==========================================================================
  # LAMBDA FUNCTIONS
  # ==========================================================================

  ApiFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - ApiFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-api'
      Description: Main FairWork Pulse REST API backend
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue:
            !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref ApiLambdaS3Key
      MemorySize: 512
      Timeout: 30
      KmsKeyArn:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-KmsKeyArn'
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-LambdaSecurityGroupId'
        SubnetIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetAId'
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetBId'
      Environment:
        Variables:
          DB_HOST:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseEndpoint'
          DB_READ_HOST:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-ReadReplicaEndpoint'
          DB_PORT:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabasePort'
          DB_NAME:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseName'
          DB_SECRET_ARN:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseSecretArn'
          JOB_QUEUE_URL: !Ref JobQueue
          ALERT_TOPIC_ARN: !Ref AlertTopic
          USER_POOL_ID: !Ref UserPool
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  WorkerFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - WorkerFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-worker'
      Description: Processes FairWork Pulse background SQS jobs
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue:
            !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref WorkerLambdaS3Key
      MemorySize: 256
      Timeout: 60
      KmsKeyArn:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-KmsKeyArn'
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-LambdaSecurityGroupId'
        SubnetIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetAId'
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetBId'
      Environment:
        Variables:
          DB_HOST:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseEndpoint'
          DB_PORT:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabasePort'
          DB_NAME:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseName'
          DB_SECRET_ARN:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseSecretArn'
          ALERT_TOPIC_ARN: !Ref AlertTopic
          SES_FROM_EMAIL: !Ref SesFromEmail
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AnalyticsFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - AnalyticsFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-analytics'
      Description: Calculates aggregated FairWork Pulse analytics
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue:
            !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref AnalyticsLambdaS3Key
      MemorySize: 512
      Timeout: 300
      KmsKeyArn:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-KmsKeyArn'
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-LambdaSecurityGroupId'
        SubnetIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetAId'
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetBId'
      Environment:
        Variables:
          DB_HOST:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseEndpoint'
          DB_READ_HOST:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-ReadReplicaEndpoint'
          DB_PORT:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabasePort'
          DB_NAME:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseName'
          DB_SECRET_ARN:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseSecretArn'
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  DatabaseInitFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - DatabaseInitFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-database-init'
      Description: Creates or updates the FairWork Pulse database schema
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue:
            !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref DatabaseInitLambdaS3Key
      MemorySize: 256
      Timeout: 300
      KmsKeyArn:
        Fn::ImportValue:
          !Sub '${InfrastructureStackName}-KmsKeyArn'
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-LambdaSecurityGroupId'
        SubnetIds:
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetAId'
          - Fn::ImportValue:
              !Sub '${InfrastructureStackName}-PrivateAppSubnetBId'
      Environment:
        Variables:
          DB_HOST:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseEndpoint'
          DB_PORT:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabasePort'
          DB_NAME:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseName'
          DB_SECRET_ARN:
            Fn::ImportValue:
              !Sub '${InfrastructureStackName}-DatabaseSecretArn'
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  WorkerQueueEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt JobQueue.Arn
      FunctionName: !Ref WorkerFunction
      Enabled: true
      BatchSize: 5
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # ==========================================================================
  # API GATEWAY
  # ==========================================================================

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-api'
      Description: FairWork Pulse REST API
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-cognito-authorizer'
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt UserPool.Arn

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: health

  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt ApiFunction.Arn

  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: '{proxy+}'

  ProxyAnyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt ApiFunction.Arn

  ProxyOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - HealthGetMethod
      - ProxyAnyMethod
      - ProxyOptionsMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: !Sub 'FairWork Pulse API deployment ${DeploymentVersion}'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref ApiStageName
      Description: !Sub '${ProjectName} ${EnvironmentName} stage'
      TracingEnabled: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  # ==========================================================================
  # EVENTBRIDGE ANALYTICS SCHEDULE
  # ==========================================================================

  AnalyticsScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-analytics-schedule'
      Description: Runs FairWork Pulse aggregate analytics
      ScheduleExpression: !Ref AnalyticsScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt AnalyticsFunction.Arn
          Id: AnalyticsLambdaTarget
          Input: '{"source":"eventbridge","action":"RUN_ANALYTICS"}'

  AnalyticsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnalyticsFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AnalyticsScheduleRule.Arn

  # ==========================================================================
  # CLOUDWATCH ALARMS
  # ==========================================================================

  ApiFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-api-errors'
      AlarmDescription: API Lambda returned one or more errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  WorkerFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-worker-errors'
      AlarmDescription: Worker Lambda returned one or more errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WorkerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  DeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-dlq-messages'
      AlarmDescription: One or more background jobs reached the dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:

  ApiUrl:
    Description: Base URL for the FairWork Pulse REST API.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}'

  HealthUrl:
    Description: Public API health endpoint.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}/health'

  RestApiId:
    Value: !Ref RestApi

  UserPoolId:
    Value: !Ref UserPool

  UserPoolArn:
    Value: !GetAtt UserPool.Arn

  UserPoolClientId:
    Value: !Ref UserPoolClient

  CognitoIssuerUrl:
    Value: !Sub 'https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${UserPool}'

  JobQueueUrl:
    Value: !Ref JobQueue

  DeadLetterQueueUrl:
    Value: !Ref DeadLetterQueue

  AlertTopicArn:
    Value: !Ref AlertTopic

  ApiFunctionName:
    Value: !Ref ApiFunction

  WorkerFunctionName:
    Value: !Ref WorkerFunction

  AnalyticsFunctionName:
    Value: !Ref AnalyticsFunction

  DatabaseInitFunctionName:
    Value: !Ref DatabaseInitFunction
