AWSTemplateFormatVersion: '2010-09-09'

Description: >
  FairWork Pulse Stack 2 for the 602AZ architecture proof of concept. Imports
  the network, database, KMS key, secret, artifact bucket, and LabRole from
  Stack 1. Creates Cognito authentication, a REST API, a small API Lambda,
  SQS with a dead-letter queue, a worker Lambda, a scheduled analytics Lambda
  that reads the RDS replica, CloudWatch log groups and alarms, and an SNS
  operational-alert topic. The complete FairWork business application and
  Next.js frontend are intentionally left for the following implementation module.

Parameters:
  InfrastructureStackName:
    Type: String
    Default: fairwork-infrastructure
    Description: Name of the deployed Stack 1 CloudFormation stack.

  ProjectName:
    Type: String
    Default: fairwork-pulse
    AllowedPattern: '^[a-z][a-z0-9-]{2,30}$'

  EnvironmentName:
    Type: String
    Default: poc
    AllowedPattern: '^[a-z][a-z0-9-]{1,15}$'

  ApiStageName:
    Type: String
    Default: poc
    AllowedPattern: '^[a-zA-Z0-9_-]+$'

  AllowedOrigin:
    Type: String
    Default: http://localhost:3000
    Description: Next.js origin permitted by CORS during local development.

  LambdaRuntime:
    Type: String
    Default: nodejs18.x
    AllowedValues:
      - nodejs18.x
    Description: Node.js 18 is used because it is supported by the AWS Academy lab.

  ApiLambdaS3Key:
    Type: String
    Description: S3 object key of the API Lambda ZIP package.

  WorkerLambdaS3Key:
    Type: String
    Description: S3 object key of the worker Lambda ZIP package.

  AnalyticsLambdaS3Key:
    Type: String
    Description: S3 object key of the analytics Lambda ZIP package.

  DeploymentVersion:
    Type: String
    Default: initial
    Description: Commit SHA used to force a new API Gateway deployment.

  AnalyticsScheduleExpression:
    Type: String
    Default: rate(1 day)
    Description: EventBridge schedule for the replica connectivity demonstration.

  AdminNotificationEmail:
    Type: String
    Default: ''
    Description: Optional email subscription for operational SNS alerts.

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 7
      - 14
      - 30
      - 60
      - 90

Conditions:
  HasAdminNotificationEmail: !Not
    - !Equals
      - !Ref AdminNotificationEmail
      - ''

Resources:
  # ---------------------------------------------------------------------------
  # Cognito: authentication foundation for the future Next.js frontend
  # ---------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-${EnvironmentName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolTags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-${EnvironmentName}-nextjs-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  EmployeeGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: EMPLOYEE
      Description: FairWork Pulse employee users
      Precedence: 30
      UserPoolId: !Ref UserPool

  EmployerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: EMPLOYER
      Description: FairWork Pulse employer users
      Precedence: 20
      UserPoolId: !Ref UserPool

  AdministratorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMINISTRATOR
      Description: FairWork Pulse administrator users
      Precedence: 10
      UserPoolId: !Ref UserPool

  # ---------------------------------------------------------------------------
  # SQS: asynchronous architecture demonstration
  # ---------------------------------------------------------------------------
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${EnvironmentName}-demo-dlq'
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  JobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${EnvironmentName}-demo-jobs'
      VisibilityTimeout: 180
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-${EnvironmentName}-architecture-alerts'
      DisplayName: FairWork architecture alerts
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AlertEmailSubscription:
    Condition: HasAdminNotificationEmail
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AdminNotificationEmail

  # ---------------------------------------------------------------------------
  # CloudWatch log groups
  # ---------------------------------------------------------------------------
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-api-demo'
      RetentionInDays: !Ref LogRetentionDays

  WorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-worker-demo'
      RetentionInDays: !Ref LogRetentionDays

  AnalyticsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${EnvironmentName}-analytics-demo'
      RetentionInDays: !Ref LogRetentionDays

  # ---------------------------------------------------------------------------
  # Lambda functions. Code is packaged separately and uploaded to Stack 1 S3.
  # ---------------------------------------------------------------------------
  ApiFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - ApiFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-api-demo'
      Description: 602AZ API, private RDS, Secrets Manager, and SQS integration demo
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue: !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref ApiLambdaS3Key
      MemorySize: 256
      Timeout: 30
      KmsKeyArn:
        Fn::ImportValue: !Sub '${InfrastructureStackName}-KmsKeyArn'
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${InfrastructureStackName}-LambdaSecurityGroupId'
        SubnetIds:
          - Fn::ImportValue: !Sub '${InfrastructureStackName}-PrivateAppSubnetAId'
          - Fn::ImportValue: !Sub '${InfrastructureStackName}-PrivateAppSubnetBId'
      Environment:
        Variables:
          DB_HOST:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabaseEndpoint'
          DB_PORT:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabasePort'
          DB_NAME:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabaseName'
          DB_SECRET_ARN:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabaseSecretArn'
          JOB_QUEUE_URL: !Ref JobQueue
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  WorkerFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - WorkerFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-worker-demo'
      Description: 602AZ SQS worker and retry/dead-letter demonstration
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue: !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref WorkerLambdaS3Key
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AnalyticsFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - AnalyticsFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${EnvironmentName}-analytics-demo'
      Description: 602AZ scheduled RDS read-replica connectivity demonstration
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Architectures:
        - x86_64
      Role:
        Fn::ImportValue: !Sub '${InfrastructureStackName}-LabRoleArn'
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub '${InfrastructureStackName}-LambdaArtifactBucketName'
        S3Key: !Ref AnalyticsLambdaS3Key
      MemorySize: 256
      Timeout: 30
      KmsKeyArn:
        Fn::ImportValue: !Sub '${InfrastructureStackName}-KmsKeyArn'
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${InfrastructureStackName}-LambdaSecurityGroupId'
        SubnetIds:
          - Fn::ImportValue: !Sub '${InfrastructureStackName}-PrivateAppSubnetAId'
          - Fn::ImportValue: !Sub '${InfrastructureStackName}-PrivateAppSubnetBId'
      Environment:
        Variables:
          DB_READ_HOST:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-ReadReplicaEndpoint'
          DB_PORT:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabasePort'
          DB_NAME:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabaseName'
          DB_SECRET_ARN:
            Fn::ImportValue: !Sub '${InfrastructureStackName}-DatabaseSecretArn'
          NODE_OPTIONS: '--enable-source-maps'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  WorkerQueueEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt JobQueue.Arn
      FunctionName: !Ref WorkerFunction
      Enabled: true
      BatchSize: 5
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # ---------------------------------------------------------------------------
  # API Gateway REST API
  # ---------------------------------------------------------------------------
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-architecture-api'
      Description: 602AZ FairWork Pulse architecture demonstration API
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-cognito-authorizer'
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt UserPool.Arn

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: health

  DatabaseHealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: database-health

  QueueTestResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: queue-test

  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt ApiFunction.Arn

  DatabaseHealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DatabaseHealthResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt ApiFunction.Arn

  QueueTestPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref QueueTestResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt ApiFunction.Arn

  HealthOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref HealthResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  DatabaseHealthOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DatabaseHealthResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  QueueTestOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref QueueTestResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - HealthGetMethod
      - DatabaseHealthGetMethod
      - QueueTestPostMethod
      - HealthOptionsMethod
      - DatabaseHealthOptionsMethod
      - QueueTestOptionsMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: !Sub '602AZ deployment ${DeploymentVersion}'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref ApiStageName
      Description: 602AZ proof-of-concept stage
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: false
          LoggingLevel: OFF
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------------------------------
  # EventBridge schedule for the replica demonstration
  # ---------------------------------------------------------------------------
  AnalyticsScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-replica-check'
      Description: Runs a scheduled connectivity check against the RDS read replica
      ScheduleExpression: !Ref AnalyticsScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt AnalyticsFunction.Arn
          Id: AnalyticsFunctionTarget

  AnalyticsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnalyticsFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AnalyticsScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # CloudWatch alarms
  # ---------------------------------------------------------------------------
  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-api-errors'
      AlarmDescription: API Lambda returned one or more errors in five minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  WorkerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-worker-errors'
      AlarmDescription: Worker Lambda returned one or more errors in five minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WorkerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  AnalyticsErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-analytics-errors'
      AlarmDescription: Scheduled read-replica check returned an error
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnalyticsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  DeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${EnvironmentName}-dlq-visible-messages'
      AlarmDescription: A demonstration message reached the dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  AwsRegion:
    Value: !Ref AWS::Region

  ApiUrl:
    Description: Base URL used by the future Next.js frontend.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}'

  HealthUrl:
    Description: Public architecture health-check endpoint.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}/health'

  DatabaseHealthUrl:
    Description: Cognito-protected primary RDS connectivity endpoint.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}/database-health'

  QueueTestUrl:
    Description: Cognito-protected SQS test endpoint.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}/queue-test'

  UserPoolId:
    Value: !Ref UserPool

  UserPoolClientId:
    Value: !Ref UserPoolClient

  CognitoIssuerUrl:
    Value: !Sub 'https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${UserPool}'

  ConfiguredUserGroups:
    Value: EMPLOYEE,EMPLOYER,ADMINISTRATOR

  JobQueueUrl:
    Value: !Ref JobQueue

  DeadLetterQueueUrl:
    Value: !Ref DeadLetterQueue

  AlertTopicArn:
    Value: !Ref AlertTopic

  ApiFunctionName:
    Value: !Ref ApiFunction

  WorkerFunctionName:
    Value: !Ref WorkerFunction

  AnalyticsFunctionName:
    Value: !Ref AnalyticsFunction
