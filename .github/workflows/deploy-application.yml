name: Deploy FairWork 602AZ Application PoC

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fairwork-602az-application-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  INFRASTRUCTURE_STACK_NAME: fairwork-infrastructure
  APPLICATION_STACK_NAME: fairwork-application-602az
  TEMPLATE_FILE: fairwork-stack2-application.yaml
  LAMBDA_RUNTIME: nodejs18.x
  ALLOWED_ORIGIN: http://localhost:3000

jobs:
  deploy-application:
    name: Package and deploy Stack 2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS identity and Stack 1
        run: |
          set -euo pipefail

          aws sts get-caller-identity

          aws cloudformation describe-stacks \
            --stack-name "${INFRASTRUCTURE_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].[StackName,StackStatus]' \
            --output table

          REPLICA_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "${INFRASTRUCTURE_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ReadReplicaEndpoint'].OutputValue | [0]" \
            --output text)

          if [ -z "${REPLICA_ENDPOINT}" ] || [ "${REPLICA_ENDPOINT}" = "None" ]; then
            echo "ERROR: Stack 1 does not export ReadReplicaEndpoint."
            exit 1
          fi

          echo "Read replica endpoint found."

      - name: Check repository files
        run: |
          set -euo pipefail

          required_files=(
            "${TEMPLATE_FILE}"
            "lambdas/api/index.js"
            "lambdas/api/package.json"
            "lambdas/worker/index.js"
            "lambdas/worker/package.json"
            "lambdas/analytics/index.js"
            "lambdas/analytics/package.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: Missing required file: ${file}"
              exit 1
            fi
          done

          echo "All Stack 2 files are present."

      - name: Read artifact bucket from Stack 1
        id: infrastructure
        run: |
          set -euo pipefail

          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${INFRASTRUCTURE_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaArtifactBucketName'].OutputValue | [0]" \
            --output text)

          if [ -z "${ARTIFACT_BUCKET}" ] || [ "${ARTIFACT_BUCKET}" = "None" ]; then
            echo "ERROR: LambdaArtifactBucketName was not found in Stack 1 outputs."
            exit 1
          fi

          echo "artifact_bucket=${ARTIFACT_BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "Artifact bucket found."

      - name: Package Lambda functions
        run: |
          set -euo pipefail
          mkdir -p build

          package_lambda() {
            local lambda_name="$1"

            pushd "lambdas/${lambda_name}" > /dev/null

            rm -rf node_modules package-lock.json

            npm install \
              --omit=dev \
              --no-audit \
              --no-fund

            zip -qr "../../build/${lambda_name}.zip" .

            popd > /dev/null
          }

          package_lambda api
          package_lambda worker
          package_lambda analytics

          echo "Created Lambda packages:"
          ls -lh build

      - name: Upload Lambda packages to S3
        id: packages
        env:
          ARTIFACT_BUCKET: ${{ steps.infrastructure.outputs.artifact_bucket }}
        run: |
          set -euo pipefail

          PREFIX="stack2-602az/${GITHUB_SHA}"

          API_KEY="${PREFIX}/api.zip"
          WORKER_KEY="${PREFIX}/worker.zip"
          ANALYTICS_KEY="${PREFIX}/analytics.zip"

          aws s3 cp \
            build/api.zip \
            "s3://${ARTIFACT_BUCKET}/${API_KEY}" \
            --region "${AWS_REGION}"

          aws s3 cp \
            build/worker.zip \
            "s3://${ARTIFACT_BUCKET}/${WORKER_KEY}" \
            --region "${AWS_REGION}"

          aws s3 cp \
            build/analytics.zip \
            "s3://${ARTIFACT_BUCKET}/${ANALYTICS_KEY}" \
            --region "${AWS_REGION}"

          echo "api_key=${API_KEY}" >> "${GITHUB_OUTPUT}"
          echo "worker_key=${WORKER_KEY}" >> "${GITHUB_OUTPUT}"
          echo "analytics_key=${ANALYTICS_KEY}" >> "${GITHUB_OUTPUT}"

          echo "Lambda packages uploaded successfully."

      - name: Validate Stack 2 template
        run: |
          set -euo pipefail

          aws cloudformation validate-template \
            --template-body "file://${TEMPLATE_FILE}" \
            --region "${AWS_REGION}"

      - name: Deploy Stack 2
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "${APPLICATION_STACK_NAME}" \
            --template-file "${TEMPLATE_FILE}" \
            --region "${AWS_REGION}" \
            --parameter-overrides \
              InfrastructureStackName="${INFRASTRUCTURE_STACK_NAME}" \
              ProjectName=fairwork-pulse \
              EnvironmentName=poc \
              ApiStageName=poc \
              AllowedOrigin="${ALLOWED_ORIGIN}" \
              LambdaRuntime="${LAMBDA_RUNTIME}" \
              ApiLambdaS3Key="${{ steps.packages.outputs.api_key }}" \
              WorkerLambdaS3Key="${{ steps.packages.outputs.worker_key }}" \
              AnalyticsLambdaS3Key="${{ steps.packages.outputs.analytics_key }}" \
              DeploymentVersion="${GITHUB_SHA}" \
              AnalyticsScheduleExpression="rate(5 minutes)" \
              LogRetentionDays=14 \
            --tags \
              Project=FairWorkPulse \
              Environment=PoC \
              Module=602AZ \
              ManagedBy=CloudFormation \
            --no-fail-on-empty-changeset

      - name: Display Stack 2 outputs
        run: |
          set -euo pipefail

          aws cloudformation describe-stacks \
            --stack-name "${APPLICATION_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table

      - name: Test public health endpoint
        run: |
          set -euo pipefail

          HEALTH_URL=$(aws cloudformation describe-stacks \
            --stack-name "${APPLICATION_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='HealthUrl'].OutputValue | [0]" \
            --output text)

          if [ -z "${HEALTH_URL}" ] || [ "${HEALTH_URL}" = "None" ]; then
            echo "ERROR: HealthUrl was not found in Stack 2 outputs."
            exit 1
          fi

          echo "Testing ${HEALTH_URL}"

          curl \
            --fail \
            --show-error \
            --silent \
            "${HEALTH_URL}"

          echo
          echo "Health endpoint test completed successfully."
